<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes commandes - MarcShop</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: "Inter", sans-serif;
            background: linear-gradient(135deg, #f8fafc, #e2e8f0);
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1rem;
        }
        
        /* Header */
        .header {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 4rem;
        }
        
        .logo h1 {
            font-size: 1.5rem;
            font-weight: 700;
        }
        
        .logo a {
            color: white;
            text-decoration: none;
        }
        
        .header-actions {
            display: flex;
            gap: 0.5rem;
        }
        
        .cart-btn {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 0.375rem;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: background-color 0.2s;
        }
        
        .cart-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        /* Orders Container */
        .orders-container {
            max-width: 900px;
            margin: 2rem auto;
            padding: 2rem;
            background: white;
            border-radius: 1rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        .orders-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid #10b981;
        }
        
        .orders-header h1 {
            color: #10b981;
            font-size: 2rem;
        }
        
        .back-btn {
            background: #6b7280;
            color: white;
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: background 0.3s;
        }
        
        .back-btn:hover {
            background: #4b5563;
        }
        
        .orders-list {
            min-height: 300px;
        }
        
        .order-history-item {
            background: #f9fafb;
            border-radius: 0.75rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid #e5e7eb;
            transition: all 0.3s;
        }
        
        .order-history-item:hover {
            transform: translateX(5px);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #e5e7eb;
        }
        
        .order-id {
            font-size: 1.1rem;
            font-weight: 600;
            color: #1e293b;
        }
        
        .order-id span {
            color: #10b981;
            font-family: monospace;
            font-size: 1.2rem;
            background: #f0fdf4;
            padding: 0.25rem 0.5rem;
            border-radius: 0.25rem;
        }
        
        .order-status {
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            font-weight: 600;
            font-size: 0.9rem;
        }
        
        .status-paid {
            background: #10b981;
            color: white;
        }
        
        .status-processing {
            background: #3b82f6;
            color: white;
        }
        
        .status-shipped {
            background: #8b5cf6;
            color: white;
        }
        
        .status-delivered {
            background: #10b981;
            color: white;
        }
        
        .status-pending {
            background: #f59e0b;
            color: white;
        }
        
        .order-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
            background: white;
            padding: 1rem;
            border-radius: 0.5rem;
        }
        
        .detail-item {
            display: flex;
            flex-direction: column;
        }
        
        .detail-label {
            font-size: 0.85rem;
            color: #6b7280;
            margin-bottom: 0.25rem;
        }
        
        .detail-value {
            font-weight: 600;
            color: #1e293b;
        }
        
        .order-items {
            margin-bottom: 1.5rem;
        }
        
        .order-items h4 {
            margin-bottom: 0.75rem;
            color: #374151;
        }
        
        .items-list {
            background: white;
            border-radius: 0.5rem;
            padding: 0.5rem;
        }
        
        .item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem;
            border-bottom: 1px solid #f3f4f6;
        }
        
        .item-row:last-child {
            border-bottom: none;
        }
        
        .item-name {
            font-weight: 500;
        }
        
        .item-details {
            font-size: 0.9rem;
            color: #6b7280;
        }
        
        .item-price {
            font-weight: 600;
            color: #10b981;
        }
        
        .tracking-info {
            background: #dbeafe;
            padding: 1rem;
            border-radius: 0.5rem;
            margin-top: 1rem;
        }
        
        .tracking-link {
            color: #1e40af;
            text-decoration: none;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: #dbeafe;
            border-radius: 0.375rem;
            transition: background 0.2s;
        }
        
        .tracking-link:hover {
            background: #bfdbfe;
            text-decoration: none;
        }
        
        .no-orders {
            text-align: center;
            padding: 4rem 2rem;
            color: #6b7280;
            background: #f9fafb;
            border-radius: 1rem;
        }
        
        .no-orders i {
            font-size: 4rem;
            color: #10b981;
            margin-bottom: 1.5rem;
        }
        
        .no-orders h3 {
            color: #1e293b;
            margin-bottom: 0.5rem;
        }
        
        .loading {
            text-align: center;
            padding: 3rem;
            color: #6b7280;
        }
        
        .loading i {
            font-size: 2rem;
            margin-bottom: 1rem;
            color: #10b981;
            animation: spin 1s infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .footer {
            background: #1e293b;
            color: white;
            padding: 2rem 0;
            margin-top: 3rem;
            text-align: center;
        }
        
        .footer p {
            color: #9ca3af;
            margin: 0.25rem 0;
        }
        
        .footer a {
            color: #10b981;
            text-decoration: none;
        }
        
        .footer a:hover {
            text-decoration: underline;
        }
        
        @media (max-width: 768px) {
            .orders-container {
                margin: 1rem;
                padding: 1.5rem;
            }
            
            .orders-header {
                flex-direction: column;
                gap: 1rem;
                text-align: center;
            }
            
            .order-header {
                flex-direction: column;
                gap: 1rem;
                text-align: center;
            }
            
            .order-details {
                grid-template-columns: 1fr;
            }
            
            .item-row {
                flex-direction: column;
                gap: 0.5rem;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <a href="index.html">
                        <h1>MarcShop</h1>
                    </a>
                </div>
                <div class="header-actions">
                    <a href="index.html" class="cart-btn">
                        <i class="fas fa-home"></i> Accueil
                    </a>
                </div>
            </div>
        </div>
    </header>

    <!-- Contenu principal -->
    <div class="container">
        <div class="orders-container">
            <div class="orders-header">
                <h1><i class="fas fa-history"></i> Mes commandes</h1>
                <a href="index.html" class="back-btn">
                    <i class="fas fa-arrow-left"></i> Retour à la boutique
                </a>
            </div>
            
            <div id="ordersList" class="orders-list">
                <div class="loading">
                    <i class="fas fa-circle-notch"></i>
                    <p>Chargement de vos commandes...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>© 2024 MarcShop - Tous droits réservés</p>
            <p>📞 8093-978-951 | 📧 marcshop0705@gmail.com</p>
            <p>📍 Livraison gratuite partout en Haïti</p>
        </div>
    </footer>

    <!-- Firebase SDK - Version 12.1.0 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyC_krW6QcyTS6JZNJf-_7YAc_491mCWYaQ",
            authDomain: "marchat-e4d21.firebaseapp.com",
            projectId: "marchat-e4d21",
            storageBucket: "marchat-e4d21.appspot.com",
            messagingSenderId: "211043298263",
            appId: "1:211043298263:web:dcf751d299aa4360d83992"
        };
        
        // Initialiser Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        console.log("✅ Firebase initialisé dans mes-commandes.html");
        
        // Récupérer l'utilisateur connecté
        let currentUser = null;
        try {
            const userData = localStorage.getItem("marcshop-current-user");
            currentUser = userData ? JSON.parse(userData) : null;
            console.log("👤 Utilisateur connecté:", currentUser);
        } catch (e) {
            console.error("Erreur lecture utilisateur:", e);
        }
        
        // Fonction pour charger les commandes
        async function loadUserOrders() {
            const ordersList = document.getElementById("ordersList");
            
            if (!currentUser) {
                ordersList.innerHTML = `
                    <div class="no-orders">
                        <i class="fas fa-user-circle"></i>
                        <h3>Vous n'êtes pas connecté</h3>
                        <p>Veuillez vous connecter pour voir vos commandes</p>
                        <a href="index.html" style="color: #10b981; text-decoration: none; display: inline-block; margin-top: 1rem;">
                            <i class="fas fa-home"></i> Retour à l'accueil
                        </a>
                    </div>
                `;
                return;
            }
            
            try {
                console.log("🔍 Recherche des commandes pour l'utilisateur:", currentUser.id);
                
                // Requête pour trouver les commandes de l'utilisateur
                const ordersRef = collection(db, "orders");
                const q = query(ordersRef, where("userId", "==", currentUser.id));
                const querySnapshot = await getDocs(q);
                
                console.log("📊 Nombre de commandes trouvées:", querySnapshot.size);
                
                if (querySnapshot.empty) {
                    ordersList.innerHTML = `
                        <div class="no-orders">
                            <i class="fas fa-shopping-bag"></i>
                            <h3>Aucune commande</h3>
                            <p>Vous n'avez pas encore passé de commande</p>
                            <a href="index.html" style="color: #10b981; text-decoration: none; display: inline-block; margin-top: 1rem;">
                                <i class="fas fa-shopping-cart"></i> Commencer mes achats
                            </a>
                        </div>
                    `;
                    return;
                }
                
                let html = '';
                
                // Trier les commandes par date (plus récente en premier)
                const orders = [];
                querySnapshot.forEach(doc => {
                    const order = doc.data();
                    order.id = doc.id;
                    orders.push(order);
                });
                
                orders.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
                
                orders.forEach(order => {
                    const orderDate = order.createdAt ? new Date(order.createdAt) : new Date();
                    const hasTracking = order.trackingInfo;
                    const trackingLink = `tracking.html?order=${order.id}`;
                    
                    // Déterminer la classe du statut
                    let statusClass = 'status-pending';
                    let statusText = 'En attente';
                    
                    if (order.status === 'paid') {
                        statusClass = 'status-paid';
                        statusText = 'Payé';
                    } else if (order.status === 'processing') {
                        statusClass = 'status-processing';
                        statusText = 'En préparation';
                    } else if (order.status === 'shipped' || order.trackingInfo) {
                        statusClass = 'status-shipped';
                        statusText = 'Expédié';
                    } else if (order.status === 'delivered') {
                        statusClass = 'status-delivered';
                        statusText = 'Livré';
                    }
                    
                    // Formater les items
                    const itemsList = order.items ? order.items.map(item => `
                        <div class="item-row">
                            <div>
                                <span class="item-name">${item.name || 'Produit'}</span>
                                <div class="item-details">
                                    ${item.size ? `Taille: ${item.size}` : ''} 
                                    ${item.color ? `${item.size ? ' • ' : ''}Couleur: ${item.color}` : ''}
                                </div>
                            </div>
                            <div>
                                <span class="item-price">$${item.price?.toFixed(2) || '0.00'}</span>
                                <span style="color: #6b7280; margin-left: 1rem;">x${item.quantity || 1}</span>
                            </div>
                        </div>
                    `).join('') : '<p>Aucun article</p>';
                    
                    html += `
                        <div class="order-history-item">
                            <div class="order-header">
                                <div class="order-id">
                                    Commande <span>#${order.id.substring(0, 8)}</span>
                                </div>
                                <span class="order-status ${statusClass}">
                                    ${statusText}
                                </span>
                            </div>
                            
                            <div class="order-details">
                                <div class="detail-item">
                                    <span class="detail-label">Date</span>
                                    <span class="detail-value">${orderDate.toLocaleDateString('fr-FR')}</span>
                                </div>
                                <div class="detail-item">
                                    <span class="detail-label">Total</span>
                                    <span class="detail-value">$${order.totalAmount?.toFixed(2) || '0.00'}</span>
                                </div>
                                <div class="detail-item">
                                    <span class="detail-label">Paiement</span>
                                    <span class="detail-value">${order.paymentMethod === 'paypal' ? 'PayPal' : 'NatCash'}</span>
                                </div>
                                <div class="detail-item">
                                    <span class="detail-label">Articles</span>
                                    <span class="detail-value">${order.items?.length || 0}</span>
                                </div>
                            </div>
                            
                            <div class="order-items">
                                <h4>Articles commandés</h4>
                                <div class="items-list">
                                    ${itemsList}
                                </div>
                            </div>
                            
                            <div style="display: flex; gap: 1rem; justify-content: flex-end; margin-top: 1rem;">
                                ${hasTracking ? `
                                    <a href="${trackingLink}" class="tracking-link" style="background: #3b82f6; color: white; padding: 0.75rem 1.5rem; border-radius: 0.5rem; text-decoration: none;">
                                        <i class="fas fa-truck"></i> Suivre mon colis
                                    </a>
                                ` : `
                                    <span style="background: #f3f4f6; color: #6b7280; padding: 0.75rem 1.5rem; border-radius: 0.5rem;">
                                        <i class="fas fa-clock"></i> En attente d'expédition
                                    </span>
                                `}
                            </div>
                            
                            ${order.customerAddress ? `
                                <div style="margin-top: 1rem; padding: 0.75rem; background: #f8f9fa; border-radius: 0.5rem; font-size: 0.9rem;">
                                    <strong><i class="fas fa-map-marker-alt"></i> Adresse de livraison:</strong>
                                    <p style="margin-top: 0.25rem; color: #4b5563;">${order.customerAddress}</p>
                                </div>
                            ` : ''}
                        </div>
                    `;
                });
                
                ordersList.innerHTML = html;
                
            } catch (error) {
                console.error("❌ Erreur détaillée:", error);
                ordersList.innerHTML = `
                    <div class="no-orders">
                        <i class="fas fa-exclamation-triangle" style="color: #ef4444;"></i>
                        <h3>Erreur de chargement</h3>
                        <p>${error.message || "Une erreur est survenue"}</p>
                        <button onclick="location.reload()" style="background: #10b981; color: white; padding: 0.75rem 1.5rem; border: none; border-radius: 0.5rem; cursor: pointer; margin-top: 1rem;">
                            <i class="fas fa-sync"></i> Réessayer
                        </button>
                    </div>
                `;
            }
        }
        
        // Charger les commandes au chargement de la page
        document.addEventListener("DOMContentLoaded", loadUserOrders);
        
        // Rendre la fonction disponible globalement
        window.loadUserOrders = loadUserOrders;
    </script>
</body>
</html>
